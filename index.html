<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页 | Gamer & Creator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 50px 0;
            background: linear-gradient(to right, #f59e0b, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .section {
            margin: 50px 0;
        }
        .section h2 {
            border-bottom: 2px solid #f59e0b;
            padding-bottom: 5px;
            margin-bottom: 20px;
            color: #f59e0b;
        }
        .interest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .interest-card {
            background-color: #1f2937;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #8b5cf6;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .project-card {
            background-color: #1f2937;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #374151;
        }
        .tags {
            margin-bottom: 10px;
        }
        .tag {
            display: inline-block;
            background-color: #374151;
            color: #f59e0b;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-right: 5px;
        }
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skill {
            background-color: #1f2937;
            color: #8b5cf6;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .contact {
            text-align: center;
        }
        .contact-btn {
            display: inline-block;
            background-color: #f59e0b;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px;
        }
        .social-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .social-links a {
            display: inline-block;
            background-color: #1f2937;
            color: #f3f4f6;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        .social-links a:hover {
            background-color: #374151;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #9ca3af;
            font-size: 0.8em;
            border-top: 1px solid #374151;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>PLAYER_LZ</h1>
        <p>在暗区突围，用代码创造世界</p>
    </header>

    <div class="container">
        <section class="section">
            <h2>兴趣领域</h2>
            <div class="interest-grid">
                <div class="interest-card">
                    <h3> 暗区突围</h3>
                    <p>热爱战术博弈与资源管理，享受高风险高回报的撤离快感。</p>
                </div>
                <div class="interest-card">
                    <h3>创游世界</h3>
                    <p>在游戏编辑器中释放创造力，独立设计关卡和脚本逻辑。</p>
                </div>
                <div class="interest-card">
                    <h3>编程开发</h3>
                    <p>用代码将想法变为现实，擅长游戏脚本与自动化工具。</p>
                </div>
                <div class="interest-card">
                    <h3>人工智能</h3>
                    <p>探索AI在游戏与创作中的应用，研究智能内容生成。</p>
                </div>
            </div>
        </section>

  
        <section class="section">
            <h2>技能树</h2>
            <div class="skills">
                <span class="skill">Python</span>
                <span class="skill">JavaScript</span>
                <span class="skill">C#</span>
                <span class="skill">创游编辑器</span>
                <span class="skill">AI Prompt</span>
                <span class="skill">Git</span>
            </div>
        </section>

        <section class="section contact">
            <h2>组队邀请</h2>
            <div class="social-links">
                <a href="https://space.bilibili.com/3493286029298337
" target="_blank"> 哔哩哔哩</a>
         <a href="mailto:Hello.luozhong@outlook.com"> Outlook</a>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 LZ. 在暗区搜刮灵感，在创游建造梦想.</p>
    </footer>

</body>
</html>
